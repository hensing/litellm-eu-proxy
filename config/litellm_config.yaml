model_list:

  # ── LightOnOCR-2 (self-hosted via Ollama) ────────────────────────────────────
  # 1B vision-language model optimised for document OCR, running locally.
  # Pull once after first start:
  #   docker exec litellm-ollama ollama pull maternion/LightOnOCR-2
  - model_name: lighton-ocr
    litellm_params:
      model: ollama_chat/maternion/LightOnOCR-2
      api_base: http://ollama:11434


  # ── Mistral AI ────────────────────────────────────────────────────────────────
  # Docs:    https://docs.mistral.ai/models/overview
  # Pricing: https://mistral.ai/pricing
  # API key: https://console.mistral.ai → API Keys

  - model_name: mistral-small           # Tagging, n8n, paperless-gpt — Preis-Leistung
    litellm_params:                     # Mistral Small 4 · $0.15/$0.60 per M tokens
      model: mistral/mistral-small-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: mistral-large           # Best-in-class für komplexere Aufgaben
    litellm_params:                     # Mistral Large 3 · $0.50/$1.50 per M tokens
      model: mistral/mistral-large-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: mistral-embed           # Multilingual embeddings
    litellm_params:
      model: mistral/mistral-embed
      api_key: os.environ/MISTRAL_API_KEY

  # Voxtral Audio — OpenAI-compatible endpoints on Mistral's API base
  # Verify slugs: curl https://api.mistral.ai/v1/models -H "Authorization: Bearer $MISTRAL_API_KEY"

  - model_name: mistral-tts             # Voxtral TTS · EN + DE · $0.016/1k chars
    litellm_params:
      model: openai/voxtral-tts-26-03
      api_base: https://api.mistral.ai/v1
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: mistral-stt             # Voxtral Transcribe V2 · EN + DE · $0.003/min (batch)
    litellm_params:
      model: openai/voxtral-mini-transcribe-26-02
      api_base: https://api.mistral.ai/v1
      api_key: os.environ/MISTRAL_API_KEY


litellm_settings:
  drop_params: true           # Ignore unsupported parameters instead of returning an error

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  proxy_server_url: os.environ/LITELLM_PROXY_URL
  alerting:
    - email
